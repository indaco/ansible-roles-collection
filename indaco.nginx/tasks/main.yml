---
# tasks file for roles/indaco.nginx

- name: Install nginx
  become: yes
  ansible.builtin.apt:
    name: nginx
    state: present
  tags:
    - nginx

- name: Copy nginx.conf file
  become: yes
  ansible.builtin.copy:
    src: etc/nginx/nginx.conf
    dest: /etc/nginx/nginx.conf
    backup: yes
  notify:
    - Restart Nginx
  tags:
    - nginx

- name: Setup UFW
  become: yes
  community.general.ufw:
    rule: allow
    name: Nginx Full
  tags:
    - firewall
    - nginx
