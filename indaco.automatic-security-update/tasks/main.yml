---
# tasks file for roles/automatic-security-update

- name: Update apt-get repo and cache
  become: yes
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
    upgrade: yes
  tags: ['skip_ansible_lint']

- name: Include ARM tasks
  ansible.builtin.include_tasks: arm.yml
  when: '"arm" in ansible_architecture or ansible_architecture == "aarch64"'

- name: Include x86_64 tasks
  ansible.builtin.include_tasks: x86.yml
  when: ansible_architecture == "x86_64"

- name: Auto Remove Unused Dependencies
  become: yes
  ansible.builtin.lineinfile:
    path: /etc/apt/apt.conf.d/50unattended-upgrades
    regexp: '^//Unattended-Upgrade::Remove-Unused-Dependencies "false";'
    line: 'Unattended-Upgrade::Remove-Unused-Dependencies "true";'
