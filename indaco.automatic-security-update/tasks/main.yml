---
# tasks file for roles/automatic-security-update

- name: Update apt-get repo and cache
  become: yes
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
    upgrade: yes
  tags: ["skip_ansible_lint"]

- name: Install required packages
  become: yes
  ansible.builtin.apt:
    name:
      - unattended-upgrades
      - update-notifier-common
    state: present
  tags:
    - packages

- name: Enable Email notification after each security update
  become: yes
  ansible.builtin.lineinfile:
    path: /etc/apt/apt.conf.d/50unattended-upgrades
    regexp: "^//Unattended-Upgrade::Mail"
    line: 'Unattended-Upgrade::Mail "{{ ansible_user }}";'

- name: Auto Remove Unused Dependencies
  become: yes
  ansible.builtin.lineinfile:
    path: /etc/apt/apt.conf.d/50unattended-upgrades
    regexp: '^//Unattended-Upgrade::Remove-Unused-Dependencies "false";'
    line: 'Unattended-Upgrade::Remove-Unused-Dependencies "true";'
