---
# tasks file for roles/firewall

- name: Install UFW
  become: yes
  ansible.builtin.apt:
    name:
      - ufw
    state: present
    autoclean: yes
  tags:
    - packages

- name: Allow OpenSSH on UFW
  become: yes
  community.general.ufw:
    rule: allow
    name: OpenSSH
  tags:
    - firewall
    - openssh

- name: Enable UFW
  become: yes
  community.general.ufw:
    state: enabled
  tags:
    - firewall

- name: Set UFW logging
  become: yes
  community.general.ufw:
    logging: 'on'
  tags:
    - firewall

- name: Enable UFW at startup
  become: yes
  ansible.builtin.systemd:
    state: started
    name: ufw
  tags:
    - firewall
