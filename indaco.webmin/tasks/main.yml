---
# tasks file for roles/webmin

- name: Ensure dependencies are installed
  become: yes
  ansible.builtin.apt:
    name:
      - perl
      - libnet-ssleay-perl
      - openssl
      - libauthen-pam-perl
      - libpam-runtime
      - libio-pty-perl
      - apt-show-versions
      - python3
      - apt-transport-https
      - gnupg2
      - ufw
    state: present
    autoclean: yes
  tags:
    - packages
    - webmin

- name: Check if webmin is already installed
  ansible.builtin.command: dpkg-query -W webmin
  register: webmin_package_check_deb
  failed_when: webmin_package_check_deb.rc > 1
  changed_when: webmin_package_check_deb.rc == 1
  tags:
    - packages
    - webmin

- name: Include architecture-specific tasks for ARM
  ansible.builtin.include_tasks: raspberrypi.yml
  when: '"arm" in ansible_architecture or ansible_architecture == "aarch64"'

- name: Include architecture-specific tasks for x86_64
  ansible.builtin.include_tasks: debian.yml
  when: ansible_architecture == "x86_64"

- name: Allow Webmin default port on UFW
  become: yes
  community.general.ufw:
    rule: allow
    port: "{{ webmin_port }}"
    proto: tcp
  tags:
    - firewall
    - webmin

- name: Reload UFW
  become: yes
  community.general.ufw:
    state: enabled
  tags:
    - firewall
