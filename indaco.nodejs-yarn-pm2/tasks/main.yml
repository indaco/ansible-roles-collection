---
# tasks file for roles/nodejs_yarn_pm2

- name: Ensure dependencies are installed
  become: yes
  ansible.builtin.apt:
    name:
      - gcc
      - g++
      - make
      - apt-transport-https
      - gnupg2
      - ca-certificates
      - curl
    state: present

## NodeJS
- name: Create keyrings directory
  become: yes
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download NodeSource GPG key
  become: yes
  ansible.builtin.shell: curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg --yes
  args:
    creates: /etc/apt/keyrings/nodesource.gpg

- name: Add NodeSource repository
  become: yes
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ nodejs_version }} nodistro main"
    filename: nodesource
    state: present
  register: node_repo

- name: Update apt cache if repo was added
  become: yes
  ansible.builtin.apt:
    update_cache: yes
  when: node_repo.changed
  tags: ['skip_ansible_lint']

- name: Ensure Node.js and npm are installed
  become: yes
  ansible.builtin.apt:
    name: nodejs
    state: present

## Yarn
- name: Enable Corepack for Yarn
  become: yes
  ansible.builtin.command: corepack enable
  changed_when: false

## PM2
- name: Install PM2 Globally
  become: yes
  community.general.npm:
    name: pm2
    global: yes
    state: latest

- name: Generate a startup script for PM2
  become: yes
  ansible.builtin.command: "pm2 startup systemd -u {{ ansible_user }} --hp /home/{{ ansible_user }}"
  args:
    creates: "/etc/systemd/system/pm2-{{ ansible_user }}.service"
  environment:
    PATH: "{{ ansible_env.PATH }}"
