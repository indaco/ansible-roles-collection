---
- name: Check if Go is already installed
  ansible.builtin.stat:
    path: "{{ go_bin }}"
  register: result

- name: Download and Extract Go to {{ go_installation_dir }}
  become: yes
  ansible.builtin.unarchive:
    src: "{{ golang_download_url }}"
    dest: "{{ go_installation_dir }}"
    remote_src: yes
  when: not result.stat.exists
  tags:
    - packages
    - golang

- name: Check Go v.{{ golang_version }}
  ansible.builtin.command: "{{ go_bin }} version"
  register: check_go_version
  changed_when: false

- name: Show Go version
  ansible.builtin.debug:
    var: check_go_version.stdout

- name: Create GOHOME for Go development
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/golang/src"
    state: directory
    recurse: yes
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  tags:
    - packages
    - golang

- name: Get the shell for {{ ansible_user }}
  ansible.builtin.command: getent passwd {{ ansible_user }}
  register: shell_output
  changed_when: false

- name: Add Go bin to PATH in .bashrc
  ansible.builtin.lineinfile:
    path: "/home/{{ ansible_user }}/.bashrc"
    regexp: "^export PATH=.*go/bin"
    line: "export PATH=$HOME/bin:/usr/local/bin:/usr/local/go/bin:$PATH"
  when: '"/bash" in shell_output.stdout and golang_version in check_go_version.stdout'

- name: Add Go bin to PATH in .zshrc
  ansible.builtin.lineinfile:
    path: "/home/{{ ansible_user }}/.zshrc"
    regexp: "^export PATH=.*go/bin"
    line: "export PATH=$HOME/bin:/usr/local/bin:/usr/local/go/bin:$PATH"
  when: '"/zsh" in shell_output.stdout and golang_version in check_go_version.stdout'

- name: Add GOPATH variable to shell config
  ansible.builtin.lineinfile:
    path: '/home/{{ ansible_user }}/{{ "/zsh" in shell_output.stdout | ternary(".zshrc", ".bashrc") }}'
    insertafter: "^export PATH="
    state: present
    line: "export GOPATH=$HOME/golang"
  when: golang_version in check_go_version.stdout
