---
golang_arch_map:
  x86_64: amd64
  aarch64: arm64
  armv7l: armv6l
  armv6l: armv6l

golang_arch: "{{ golang_arch_map[ansible_architecture] | default('amd64') }}"
golang_file: 'go{{ golang_version }}.linux-{{ golang_arch }}.tar.gz'
golang_download_url: 'https://dl.google.com/go/{{ golang_file }}'

# Legacy aliases for backward compatibility
golang_ubuntu_file: '{{ golang_file }}'
golang_ubuntu_link: '{{ golang_download_url }}'
golang_raspian_file: '{{ golang_file }}'
golang_raspian_link: '{{ golang_download_url }}'

go_installation_dir: /usr/local
go_bin: '{{ go_installation_dir }}/go/bin/go'
